version: 1
extends: papers.yml
project:
  id: scipy-2026-cliff_kerr
  title:
    'Vibes, meet rigor: Evaluating and improving AI performance on complex
    scientific code'
  description: >-
    We quantitatively evaluated LLMs with and without domain-specific tools (MCP
    servers and skills) on a Starsim disease modeling benchmark, finding that
    custom tools improved performance.
  # Authors should have affiliations, emails and ORCIDs if available
  authors:
    - name: Cliff Kerr
      email: info@starsim.org
      orcid: 0000-0003-2517-2354
      affiliations:
        - Institute for Disease Modeling, Gates Foundation, Seattle, USA
      corresponding: true
    - name: Katherine Rosenfeld
      email: katherine.rosenfeld@gatesfoundation.org
      orcid: 0000-0001-8902-9990
      affiliations:
        - Institute for Disease Modeling, Gates Foundation, Seattle, USA
    - name: Jessica Lundin
      email: jessica.lundin@gatesfoundation.org
      affiliations:
        - Institute for Disease Modeling, Gates Foundation, Seattle, USA
    - name: Robyn Stuart
      email: robyn.stuart@gatesfoundation.org
      orcid: 0000-0001-6867-9265
      affiliations:
        - Institute for Disease Modeling, Gates Foundation, Seattle, USA
    - name: Romesh Abeysuriya
      email: romesh.abeysuriya@burnet.edu.au
      orcid: 0000-0002-9618-6457
      affiliations:
        - Burnet Institute, Melbourne, Australia
  keywords:
    - AI evaluation
    - agent-based model
    - disease modeling
    - Starsim
    - Sciris
    - Inspect.ai
    - Claude
  abbreviations:
    MCP: Model Context Protocol
    LLM: Large Language Model
  # It is possible to explicitly ignore the `doi-exists` check for certain citation keys
  error_rules:
    - rule: doi-exists
      severity: ignore
      keys:
        - starsim
        - starsim_crn
        - scicode
        - terminalbench
  exports:
    - id: pdf
      format: typst
      template: https://github.com/curvenote-templates/scipy.git
      article: main.md
      output: full_text.pdf
